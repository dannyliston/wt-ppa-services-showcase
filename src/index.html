<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WT — Portfolio & Program Advisory</title>
  <style>
    body { background: #0A0F1A; margin: 0; }
    .loader { display: flex; align-items: center; justify-content: center;
      height: 100vh; gap: 8px; flex-direction: column; }
    .loader__mark { width: 56px; height: 56px; background: #FFC200;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 22px; color: #0A0F1A;
      font-family: sans-serif; margin-bottom: 24px; }
    .loader__dots { display: flex; gap: 8px; }
    .loader-dot { width: 6px; height: 6px; border-radius: 50%;
      background: #FFC200; animation: pulse 1.4s ease-in-out infinite; }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); } }
  </style>
</head>
<body>
  <div id="loader" class="loader">
    <div class="loader__mark">WT</div>
    <div class="loader__dots">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
  </div>
  <div id="app" style="display:none;"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
